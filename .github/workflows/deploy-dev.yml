name: Deploy dev to server

on:
  push:
    branches: [ "dev" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    if: ${{ secrets.DEV_HOST != '' && secrets.DEV_USER != '' && secrets.DEV_SSH_KEY != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Validate deploy secrets
        run: |
          : "${{ secrets.DEV_HOST }}" "${{ secrets.DEV_USER }}" "${{ secrets.DEV_SSH_KEY }}"
          echo "Secrets present. Proceeding with SSH deploy."
      - name: SSH deploy to dev
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.DEV_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -e
            APP_PATH="${{ secrets.DEV_PATH }}"
            [ -z "$APP_PATH" ] && APP_PATH="/opt/matchleague"
            if [ ! -d "$APP_PATH/.git" ]; then
              command -v git >/dev/null 2>&1 || { apt-get update -y && apt-get install -y git; }
              mkdir -p "$APP_PATH"
              git clone https://github.com/${{ github.repository }} "$APP_PATH"
            fi
            cd "$APP_PATH"
            git fetch --all --prune
            git checkout dev || git checkout -b dev origin/dev
            git pull --ff-only origin dev
            bash "$APP_PATH/scripts/deploy-dev.sh" dev "$APP_PATH"
