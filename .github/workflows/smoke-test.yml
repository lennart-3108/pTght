name: Smoke Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    env:
      API_BASE: http://localhost:5001
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install backend deps
        working-directory: ./backend
        run: |
          npm ci

      - name: Run migrations (SQLite)
        working-directory: ./backend
        run: |
          npm run migrate

      - name: Start backend
        working-directory: ./backend
        run: |
          # start backend in background
          npm start &
          echo $! > backend_pid.txt
        env:
          # override any env if necessary
          PORT: 5001

      - name: Wait for backend to be ready
        run: |
          # Wait up to 30s for port 5001 to be open
          for i in {1..30}; do
            if nc -z localhost 5001; then
              echo "backend ready"; exit 0;
            fi
            sleep 1
          done
          echo "backend did not start in time"; exit 1

      - name: Ensure admin user (fallback)
        working-directory: .
        env:
          SMOKE_EMAIL: ${{ secrets.SMOKE_ADMIN_EMAIL }}
          SMOKE_PASSWORD: ${{ secrets.SMOKE_ADMIN_PASSWORD }}
        run: |
          # Create an admin if none exists; script prints the created email
          node backend/scripts/create-admin.js || true
          # Prepare email/password for smoke test (use secrets if set, otherwise defaults)
          EMAIL="${SMOKE_EMAIL:-admin1@example.com}"
          PASS="${SMOKE_PASSWORD:-test1234}"
          echo "EMAIL=$EMAIL" >> "$GITHUB_ENV"
          echo "PASS=$PASS" >> "$GITHUB_ENV"

      - name: Run smoke test
        working-directory: .
        run: |
          node backend/test/smoke-teams.js --email "$EMAIL" --password "$PASS"

      - name: Stop backend
        if: always()
        run: |
          if [ -f backend/backend_pid.txt ]; then kill -TERM $(cat backend/backend_pid.txt) || true; fi
