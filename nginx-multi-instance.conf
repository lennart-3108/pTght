    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/test.matchleague.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/test.matchleague.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security Headers
