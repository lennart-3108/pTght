    # Test Instance Notice
    add_header X-Instance-Type "test" always;

    # Logs
    access_log /var/log/nginx/matchleague-test-access.log;
    error_log /var/log/nginx/matchleague-test-error.log;

    # Frontend
    root /matchleague.org/frontend/build;
    index index.html;

    location / {
