services:
  backend:
    build: ./backend
    working_dir: /app
    command: sh -c "npm ci && npm run migrate && node server.js"
    env_file:
      - ./.env
    environment:
      - PORT=${PORT:-5001}
      # Map SQLITE_DB_PATH to SQLITE_FILE for backend/knex compatibility
      - SQLITE_DB_PATH=${SQLITE_DB_PATH:-/data/dev.sqlite}
      - SQLITE_FILE=${SQLITE_DB_PATH:-/data/dev.sqlite}
      - DATABASE_URL=${DATABASE_URL:-}
    volumes:
      - ./backend:/app
      - backend-data:/data
    ports:
      - "${BACKEND_PORT:-5001}:5001"

  frontend:
    build: ./frontend
    working_dir: /app
    # nginx-based image from Dockerfile serves build on port 80
    env_file:
      - ./.env
    environment:
      - PORT=${FRONTEND_INTERNAL_PORT:-3000}
    volumes:
      - ./frontend:/app
    ports:
      - "${FRONTEND_PORT:-3000}:80"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-matchleague}
      POSTGRES_USER: ${POSTGRES_USER:-matchleague}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-matchleague}
    volumes:
      - pg-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    profiles:
      - db

volumes:
  backend-data:
  pg-data:
